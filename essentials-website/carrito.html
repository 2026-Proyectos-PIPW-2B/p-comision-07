<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESSENTIALS - Carrito de Compras</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      h1,
      h2,
      .navbar-brand {
        font-family: "Bebas Neue", sans-serif !important;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body class="bg-light">
    <!-- NAVBAR -->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark py-2 sticky-top"
      id="navbar"
    >
      <div class="container d-flex align-items-center justify-content-between">
        <div class="flex-grow-1 flex-lg-grow-0" style="flex-basis: 200px">
          <a
            class="navbar-brand text-uppercase fs-2 m-0"
            href="inicio.html"
            style="
              font-family: &quot;Bebas Neue&quot;, sans-serif;
              letter-spacing: 1px;
            "
            >ESSENTIALS</a
          >
        </div>

        <div
          class="d-flex align-items-center justify-content-end gap-3 order-lg-3"
          style="flex-basis: 200px"
        >
          <a class="text-white fs-4" href="carrito.html"
            ><i class="bi bi-cart3"></i
          ></a>
          <span id="cuenta-navbar">
              <a class="text-white fs-4" href="login.html"><i class="bi bi-person-circle"></i></a>
          </span>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuNavegacion"
            aria-controls="menuNavegacion"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div
          class="collapse navbar-collapse flex-grow-1 order-lg-2"
          id="menuNavegacion"
        >
          <ul
            class="navbar-nav mx-auto align-items-center mb-2 mb-lg-0 text-center"
          >
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html">INICIO</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html#categorias"
                >CATEGORIAS</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="productos.html">PRODUCTOS</a>
            </li>
          </ul>
        </div>

        <div class="d-lg-none"></div>
      </div>
    </nav>

    // carrito
    <section class="py-5">
      <div class="container">
        <h2
          class="fw-bold mb-4"
          style="
            font-family: &quot;Roboto&quot;, sans-serif;
            font-size: 2rem;
            letter-spacing: 0;
          "
        >
          Carrito de Compras
        </h2>

        <div class="row g-4 align-items-start">
          <div class="col-lg-7">
            <div id="contenedor-carrito">
            </div>
          </div>

          <div class="col-lg-5">
            <div class="card border-0 shadow-sm rounded-3 p-4">
              <h5 class="fw-bold mb-4">Resumen de Compra</h5>

              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Subtotal</span>
                <span id="resumen-subtotal">$0</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Envío</span>
                <span id="resumen-envio">$0</span>
              </div>

              <hr />

              <div class="d-flex justify-content-between mb-4">
                <span class="fw-bold">Total</span>
                <span class="fw-bold fs-5" id="resumen-total">$0</span>
              </div>

              <button class="btn btn-dark rounded-pill fw-bold w-100 py-2 mb-2">
                Finalizar Compra
              </button>
              <a
                href="productos.html"
                class="d-block text-center text-muted small text-decoration-none"
                >Seguir Comprando</a
              >
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer
      class="bg-dark text-white pt-4 pb-3 border-top border-5"
      id="footer"
    >
      <div class="container text-center">
        <h3
          class="text-uppercase mb-3"
          style="
            font-family: &quot;Bebas Neue&quot;, sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
          "
        >
          ESSENTIALS
        </h3>

        <div class="mb-4">
          <h5
            class="fw-bold mb-2 text-uppercase small"
            style="letter-spacing: 2px"
          >
            Síguenos
          </h5>
          <div class="d-flex justify-content-center gap-4 fs-4">
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-twitter-x"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-tiktok"></i
            ></a>
          </div>
        </div>

        <hr class="text-white-50 mt-4 mb-3" />
        <div class="text-center text-white-50 small mb-0">
          &copy; 2026 Essentials. Todos los derechos reservados.
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cargarProductos.js"></script>
    <script src="js/carritoStorage.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/renderizarCarrito.js"></script>
    <script src="js/navbar.js"></script>
  </body>
</html>
