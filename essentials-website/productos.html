<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESSENTIALS - Inicio</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      h1,
      h2,
      .navbar-brand {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 3px;
      }
    </style>
    <script src="js/enrutamiento.js"></script>
  </head>
  <body class="bg-light">
    <!-- NAVBAR -->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark py-2 sticky-top"
      id="navbar"
    >
      <div class="container d-flex align-items-center justify-content-between">
        <div class="flex-grow-1 flex-lg-grow-0" style="flex-basis: 200px">
          <a
            class="navbar-brand text-uppercase fs-2 m-0"
            href="inicio.html"
            style="
              font-family: &quot;Bebas Neue&quot;, sans-serif;
              letter-spacing: 1px;
            "
            >ESSENTIALS</a
          >
        </div>

        <div
          class="d-flex align-items-center justify-content-end gap-3 order-lg-3"
          style="flex-basis: 200px"
        >
          <a class="text-white fs-4 position-relative" href="carrito.html">
            <i class="bi bi-cart3"></i>
            <span
              id="contador-carrito"
              class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
              style="font-size: 0.6rem"
            >0</span>
          </a>
          <span id="cuenta-navbar">
              <a class="text-white fs-4" href="login.html"><i class="bi bi-person-circle"></i></a>
          </span>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuNavegacion"
            aria-controls="menuNavegacion"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div
          class="collapse navbar-collapse flex-grow-1 order-lg-2"
          id="menuNavegacion"
        >
          <ul
            class="navbar-nav mx-auto align-items-center mb-2 mb-lg-0 text-center"
          >
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html">INICIO</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html#categorias"
                >CATEGORIAS</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="productos.html">PRODUCTOS</a>
            </li>
          </ul>
        </div>

        <div class="d-lg-none"></div>
      </div>
    </nav>

    <header></header>

    <div class="container sticky-top" style="top: 80px; z-index: 1020">
      <section
        id="filtros"
        aria-label="Filtrar y ordenar productos"
        class="bg-white shadow-sm rounded-4 py-3 border"
      >
        <div class="container-fluid">
          <div
            class="d-flex align-items-center justify-content-between flex-wrap gap-3"
          >
            <nav aria-label="Filtrar por categoría">
              <ul class="list-unstyled d-flex flex-wrap gap-2 mb-0" id="lista-categorias">
                <li>
                  <button
                    type="button"
                    class="btn btn-dark btn-sm rounded-pill px-3 fw-semibold btn-categoria"
                    data-categoria="Todos"
                  >
                    Todos
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Pantalones"
                  >
                    Pantalones
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Camperas"
                  >
                    Camperas
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Buzos"
                  >
                    Buzos
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Remeras"
                  >
                    Remeras
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Combos"
                  >
                    Combos
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    class="btn btn-outline-dark btn-sm rounded-pill px-3 btn-categoria"
                    data-categoria="Accesorios"
                  >
                    Accesorios
                  </button>
                </li>
              </ul>
            </nav>

            <div class="flex-grow-1 mx-lg-3">
              <div class="input-group input-group-sm">
                <span class="input-group-text bg-white border-end-0 rounded-start-pill">
                  <i class="bi bi-search text-muted"></i>
                </span>
                <input
                  type="text"
                  id="buscador-productos"
                  class="form-control border-start-0 rounded-end-pill"
                  placeholder="Buscar productos..."
                  aria-label="Buscar productos"
                />
              </div>
            </div>

            <div class="d-flex align-items-center gap-2">
              <label
                for="ordenar-selector"
                class="mb-0 small text-muted text-uppercase fw-semibold"
                style="letter-spacing: 1px; white-space: nowrap"
                >Ordenar por</label
              >
              <select
                id="ordenar-selector"
                class="form-select form-select-sm"
                style="min-width: 130px"
              >
                <option value="nombre">Nombre</option>
                <option value="precio">Precio</option>
              </select>
              <button
                type="button"
                id="orden-asc"
                class="btn btn-sm btn-dark"
                aria-label="Ordenar ascendente"
                title="Ascendente"
              >
                <i class="bi bi-arrow-up"></i>
              </button>
              <button
                type="button"
                id="orden-desc"
                class="btn btn-sm btn-outline-dark"
                aria-label="Ordenar descendente"
                title="Descendente"
              >
                <i class="bi bi-arrow-down"></i>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section id="productos" class="py-5">
      <div class="container">
        <div
          class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
          id="contenedor-productos"
        >
        </div>
      </div>
    </section>

    <footer class="bg-dark text-white pt-4 pb-3" id="footer">
      <div class="container text-center">
        <h3
          class="text-uppercase mb-3"
          style="
            font-family: &quot;Bebas Neue&quot;, sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
          "
        >
          ESSENTIALS
        </h3>

        <div class="mb-4">
          <h5
            class="fw-bold mb-2 text-uppercase small"
            style="letter-spacing: 2px"
          >
            Síguenos
          </h5>
          <div class="d-flex justify-content-center gap-4 fs-4">
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-twitter-x"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-tiktok"></i
            ></a>
          </div>
        </div>

        <hr class="text-white-50 mt-4 mb-3" />
        <div class="text-center text-white-50 small mb-0">
          &copy; 2026 Essentials. Todos los derechos reservados.
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cargarProductos.js"></script>
    <script src="js/carritoStorage.js"></script>
    <script src="js/agregarCarrito.js"></script>
    <script src="js/renderizarProductos.js"></script>
    <script src="js/filtrosProductos.js"></script>
    <script src="js/navbar.js"></script>
  </body>
</html>
