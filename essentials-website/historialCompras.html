          <span id="cuenta-navbar">
              <a class="text-white fs-4" href="login.html"><i class="bi bi-person-circle"></i></a>
          </span>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"

    <div class="container my-5" style="min-height: 60vh;">
      <h2 class="mb-4">Historial de Compras</h2>
      
      <section
        id="filtros-historial"
        aria-label="Filtrar historial de compras"
        class="bg-white shadow-sm rounded-4 py-3 px-4 border mb-4 sticky-top"
        style="top: 80px; z-index: 1020;"
      >
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-3 position-relative">
            <label for="filtro-fecha-desde" class="form-label small text-muted text-uppercase fw-semibold mb-1" style="letter-spacing: 1px;">Fecha Desde</label>
            <input type="date" id="filtro-fecha-desde" class="form-control form-control-sm">
            <div class="invalid-tooltip" style="font-size: 0.7rem;">Fecha futura inválida.</div>
          </div>
          <div class="col-12 col-md-3 position-relative">
            <label for="filtro-fecha-hasta" class="form-label small text-muted text-uppercase fw-semibold mb-1" style="letter-spacing: 1px;">Fecha Hasta</label>
            <input type="date" id="filtro-fecha-hasta" class="form-control form-control-sm">
            <div class="invalid-tooltip" style="font-size: 0.7rem;">Fecha futura inválida.</div>
          </div>
          <div class="col-12 col-md-3 position-relative">
            <label for="filtro-monto-min" class="form-label small text-muted text-uppercase fw-semibold mb-1" style="letter-spacing: 1px;">Monto Mín.</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">$</span>
              <input type="number" id="filtro-monto-min" class="form-control" placeholder="0" min="0">
              <div class="invalid-tooltip" style="font-size: 0.7rem;">No puede ser negativo.</div>
            </div>
          </div>
          <div class="col-12 col-md-3 position-relative">
            <label for="filtro-monto-max" class="form-label small text-muted text-uppercase fw-semibold mb-1" style="letter-spacing: 1px;">Monto Máx.</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">$</span>
              <input type="number" id="filtro-monto-max" class="form-control" placeholder="0" min="0">
              <div class="invalid-tooltip" style="font-size: 0.7rem;">No puede ser negativo.</div>
            </div>
          </div>
          <div class="col-12 d-flex justify-content-end mt-3">
            <button type="button" id="btn-limpiar-filtros" class="btn btn-sm btn-outline-dark">
              <i class="bi bi-eraser me-1"></i> Limpiar Filtros
            </button>
          </div>
        </div>
      </section>

      <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle">
          <thead class="table-dark text-center">
            <tr>
              <th scope="col">Fecha</th>
              <th scope="col">Productos</th>
              <th scope="col">Total</th>
            </tr>
          </thead>
          <tbody id="tabla-pedidos-body" class="text-center">
            </tbody>
        </table>
      </div>
      
    </div>

    <footer class="bg-dark text-white pt-4 pb-3" id="footer">
      <div class="container text-center">
        <h3
          class="text-uppercase mb-3"
          style="
            font-family: &quot;Bebas Neue&quot;, sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
          "

          ESSENTIALS

        <div class="text-center text-white-50 small mb-0">
          &copy; 2026 Essentials. Todos los derechos reservados.
        </div>
      </div>
    </footer>

    <script src="js/controlSesion.js"></script>
  </body>
