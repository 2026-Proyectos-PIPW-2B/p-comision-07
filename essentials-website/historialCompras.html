<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENTIALS - Historial de compras</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      h1,
      h2,
      .navbar-brand {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 3px;
      }
    </style>
</head>

<body class="bg-light">
    <!-- NAVBAR -->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark py-2 sticky-top"
      id="navbar"
    >
      <div class="container d-flex align-items-center justify-content-between">
        <div class="flex-grow-1 flex-lg-grow-0" style="flex-basis: 200px">
          <a
            class="navbar-brand text-uppercase fs-2 m-0"
            href="inicio.html"
            style="
              font-family: &quot;Bebas Neue&quot;, sans-serif;
              letter-spacing: 1px;
            "
            >ESSENTIALS</a
          >
        </div>

        <div
          class="d-flex align-items-center justify-content-end gap-3 order-lg-3"
          style="flex-basis: 200px"
        >
          <a class="text-white fs-4 position-relative" href="carrito.html">
            <i class="bi bi-cart3"></i>
            <span
              id="contador-carrito"
              class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
              style="font-size: 0.6rem">0</span>
          </a>
          <span id="cuenta-navbar">
              <a class="text-white fs-4" href="login.html"><i class="bi bi-person-circle"></i></a>
          </span>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuNavegacion"
            aria-controls="menuNavegacion"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div
          class="collapse navbar-collapse flex-grow-1 order-lg-2"
          id="menuNavegacion"
        >
          <ul
            class="navbar-nav mx-auto align-items-center mb-2 mb-lg-0 text-center"
          >
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html">INICIO</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="inicio.html#categorias"
                >CATEGORIAS</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="productos.html">PRODUCTOS</a>
            </li>
          </ul>
        </div>

        <div class="d-lg-none"></div>
      </div>
    </nav>

    <div class="container my-5" style="min-height: 60vh;">
      <h2 class="mb-4">Historial de Compras</h2>
      
      <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th scope="col">N° Pedido</th>
              <th scope="col">Fecha</th>
              <th scope="col">Nombre</th>
              <th scope="col">Email</th>
              <th scope="col">Productos</th>
              <th scope="col">Dirección</th>
              <th scope="col">Ciudad</th>
              <th scope="col">Total</th>
            </tr>
          </thead>
          <tbody id="tabla-pedidos-body">
            </tbody>
        </table>
      </div>
      
      <div id="mensaje-sin-pedidos" class="alert alert-info d-none text-center my-4">
        <i class="bi bi-info-circle me-2"></i> Aún no has realizado ninguna compra.
      </div>
    </div>

    <footer class="bg-dark text-white pt-4 pb-3" id="footer">
      <div class="container text-center">
        <h3
          class="text-uppercase mb-3"
          style="
            font-family: &quot;Bebas Neue&quot;, sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
          "
        >
          ESSENTIALS
        </h3>

        <div class="mb-4">
          <h5
            class="fw-bold mb-2 text-uppercase small"
            style="letter-spacing: 2px"
          >
            Síguenos
          </h5>
          <div class="d-flex justify-content-center gap-4 fs-4">
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-twitter-x"></i
            ></a>
            <a href="#" class="text-white-50 text-decoration-none"
              ><i class="bi bi-tiktok"></i
            ></a>
          </div>
        </div>

        <hr class="text-white-50 mt-4 mb-3" />
        <div class="text-center text-white-50 small mb-0">
          &copy; 2026 Essentials. Todos los derechos reservados.
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
